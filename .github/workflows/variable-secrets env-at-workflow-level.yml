name: Workflow with env and secrets at repository level

on: push

env:
  CONTAINER_REGISTRY: docker.io
  DOCKER_IMAGE: simple-nginx-app

jobs:
    docker:
      runs-on: ubuntu-latest
      steps:
          - name: Docker Pull 
            run: docker image pull  nginx:latest

          - name: Docker build
            run: docker build -t docker.io/${{vars.DOCKER_USERNAME}}/$DOCKER_IMAGE:latest .

          - name: Docker login
            run: docker login --username=${{vars.DOCKER_USERNAME}} --password=$${{secrets.DOCKER_PASSWORD}}

          - name: Docker Publish
            run: docker push ${{env.CONTAINER_REGISTRY}}/${{vars.DOCKER_USERNAME}}/${{env.DOCKER_IMAGE}}:latest

    deploy:
      needs: docker
      runs-on: ubuntu-latest
      steps:
        - name: Docker run
          run: docker run -d -p 8080:80  ${{env.CONTAINER_REGISTRY}}/${{vars.DOCKER_USERNAME}}/${{env.DOCKER_IMAGE}}:latest
