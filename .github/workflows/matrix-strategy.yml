name: Matrix Strategy

on:
    workflow_dispatch: 

jobs:
    deploy:
        strategy:
          matrix:
            os: [ubuntu-latest, ubuntu-20.04, windows-latest]
            images: [hello-world, alpine]
            exclude:
              - images: alpine
                os: windows-latest
            include:
              - images: amd64/alpine
                os:  ubuntu-20.04

        runs-on: ${{ matrix.os }}
        steps:
            - name: Echo docker Details on ${{ matrix.os }}
              run: docker info
            
            - name: Run images on ${{ matrix.images }}
              run: docker run ${{ matrix.images }}
